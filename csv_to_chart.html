<!DOCTYPE html>
<!--
  ============================================================
  csv_to_chart.html — CSV Table Viewer & Chart (dual renderer)
  ============================================================
  PURPOSE:
    Load a CSV file and render it as an interactive chart.
    Supports table editing, multiple chart types, two chart
    rendering backends, and day/night background shading.

  KEY FEATURES:
    - Drag-and-drop or file-picker CSV import
    - Proper RFC 4180 CSV parsing (handles quoted fields)
    - Auto-detects datetime x-axis
    - Dual renderer:
        • Plotly 3.6.0  — default for files < 500 KB (rich interactivity)
        • ECharts 6.1.0 — default for files ≥ 500 KB (canvas large-data mode)
    - Renderer override dropdown; active renderer shown via color-coded badge
    - Chart types: Line, Bar, Scatter
    - Smooth line, Stack series toggles
    - Per-column series visibility checkboxes
    - ECharts: data-zoom slider + scroll-wheel pan/zoom, universalTransition,
               animation suppressed > 5 k rows
    - Plotly: range-slider, spline smooth, scattergl for > 10 k rows
    - Day/Night shading (checkbox):
        • Requests GPS; falls back to IP geolocation (ipapi.co → freeipapi.com)
        • Displays editable Lat/Lon inputs — manual edit re-renders immediately
        • Computes sunrise/sunset via NOAA algorithm (pure JS, no API)
        • Renders shaded night bands on both ECharts (markArea) and Plotly (shapes)
        • Only active when x-axis data is datetime
    - Optional editable data table (hidden by default)
    - Download edited CSV with timestamped filename
    - Auto-loads sample/counts.csv if present (silent fail)

  USAGE:
    Open directly in a browser (no build step). Drop a CSV file or use the
    file picker. First column = X axis; subsequent numeric columns = series.

  DEPENDENCIES (CDN, loaded as needed):
    - ECharts 6.1.0  : https://cdn.jsdelivr.net/npm/echarts@6.1.0/dist/echarts.min.js
    - Plotly  3.6.0  : https://cdn.plot.ly/plotly-3.6.0.min.js  (lazy-loaded)

  RENDERER THRESHOLD:
    ECHARTS_THRESHOLD_BYTES = 500 * 1024  (500 KB) — edit to adjust auto-switch.

  CHANGELOG:
    v2.1  2026-06-25  Day/Night shading: GPS + IP geolocation fallback, editable
                    coords, NOAA sunrise/sunset algorithm, ECharts markArea,
                    Plotly layout shapes. dataIsDatetime flag centralised.
    v2  2026-06-20  Dual-renderer (Plotly + ECharts), col toggles, data-zoom,
                    proper CSV parser, lazy Plotly load, AGENTS.md docs.
                    ECharts 6.1.0, Plotly 3.6.0.
  ============================================================
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CSV Table Viewer and Chart with dual rendering (Plotly / ECharts), day/night background shading via GPS or IP geolocation, editable table, line/bar/scatter charts, datetime axis, per-series toggles, and timestamped CSV download.">
  <meta name="keywords" content="CSV viewer, CSV chart, Plotly, ECharts, data visualization, line chart, bar chart, scatter chart, drag and drop, CSV editor, datetime axis, large data, dual renderer, sunrise sunset, day night shading, geolocation">
  <title>CSV Table Viewer & Chart</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; margin: 1em 2em; }
    #drop-area {
      border: 2px dashed #aaa; border-radius: 8px; padding: 1.2em;
      text-align: center; color: #888; margin-bottom: 1em; background: #f9f9f9;
      cursor: pointer; transition: background 0.2s, color 0.2s;
    }
    #drop-area.drag-over { background: #e0f7fa; color: #00796b; border-color: #00796b; }
    #controls { display: flex; gap: 0.6em; align-items: center; flex-wrap: wrap; margin-bottom: 0.8em; }
    button { padding: 0.3em 0.9em; cursor: pointer; }
    select { padding: 0.3em; }
    #table-wrapper {
      max-height: 300px; overflow: auto; border: 1px solid #ddd;
      border-radius: 4px; margin-bottom: 1em; display: none;
    }
    table { border-collapse: collapse; width: 100%; font-size: 0.85em; }
    th, td { border: 1px solid #ccc; padding: 0.3em 0.6em; white-space: nowrap; }
    th { background: #f0f0f0; position: sticky; top: 0; z-index: 1; }
    td[contenteditable="true"] { background: #fffbe7; }
    #chart { width: 100%; height: 480px; }
    #status { font-size: 0.8em; color: #555; }
    #renderer-badge {
      font-size: 0.75em; padding: 0.15em 0.5em; border-radius: 3px;
      font-weight: bold; display: none;
    }
    #renderer-badge.plotly  { background: #e8f0fe; color: #1a73e8; }
    #renderer-badge.echarts { background: #e6f4ea; color: #1e8e3e; }
    #col-toggles { display: flex; gap: 0.5em; flex-wrap: wrap; margin-bottom: 0.5em; font-size: 0.85em; }
    #col-toggles label { cursor: pointer; user-select: none; }
    #col-toggles input { cursor: pointer; }
    label { display: inline-flex; align-items: center; gap: 0.25em; }
    .sep { color: #ccc; }

    /* Location panel (day/night shading) */
    #location-section {
      display: none; align-items: center; gap: 0.9em; flex-wrap: wrap;
      background: #f0f4ff; border: 1px solid #c0cce0; border-radius: 6px;
      padding: 0.5em 1em; margin-bottom: 0.8em; font-size: 0.85em;
    }
    #location-section input[type="number"] {
      width: 6.5em; padding: 0.15em 0.3em; border: 1px solid #aac; border-radius: 3px;
    }
    #location-status { color: #555; }
    #location-warn { color: #b00; font-style: italic; }
  </style>
  <!-- ECharts 6.1.0: universalTransition, improved label layout, canvas perf -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@6.1.0/dist/echarts.min.js"></script>
  <!-- Plotly 3.6.0 lazy-loaded on demand (~4.8 MB, skipped for large-file sessions) -->
</head>
<body>
  <h2 style="margin-bottom:0.5em">CSV Table Viewer &amp; Chart
    <small style="color:#888;font-size:0.6em">dual renderer</small>
  </h2>

  <input type="file" id="fileInput" accept=".csv" style="margin-bottom:0.5em">
  <div id="drop-area"><b>Drag &amp; drop a CSV file here</b> or click above to select</div>

  <div id="controls">
    <select id="chartType" onchange="applyChart()">
      <option value="line">Line</option>
      <option value="bar">Bar</option>
      <option value="scatter">Scatter</option>
    </select>

    <span class="sep">|</span>

    <label for="rendererSel" style="font-size:0.85em">Renderer:</label>
    <select id="rendererSel" onchange="onRendererChange()">
      <option value="auto">Auto (by file size)</option>
      <option value="plotly">Plotly</option>
      <option value="echarts">ECharts</option>
    </select>
    <span id="renderer-badge"></span>

    <span class="sep">|</span>

    <label><input type="checkbox" id="smoothLine" onchange="applyChart()"> Smooth</label>
    <label><input type="checkbox" id="stackSeries" onchange="applyChart()"> Stack</label>
    <label><input type="checkbox" id="dayNightCb" onchange="toggleDayNight()"> Day/Night</label>
    <label><input type="checkbox" id="showTable" onchange="toggleTable()"> Table</label>

    <span class="sep">|</span>

    <button onclick="downloadCSV()">Download CSV</button>
    <span id="status"></span>
  </div>

  <!-- Location panel: shown when Day/Night checkbox is active -->
  <div id="location-section">
    <span id="location-status">Detecting location…</span>
    <label>Lat: <input id="inputLat" type="number" step="0.0001" min="-90" max="90" onchange="onCoordsEdit()"></label>
    <label>Lon: <input id="inputLon" type="number" step="0.0001" min="-180" max="180" onchange="onCoordsEdit()"></label>
    <span id="location-warn"></span>
  </div>

  <div id="col-toggles"></div>
  <div id="table-wrapper"><div id="table-container"></div></div>
  <div id="chart"></div>

  <script>
    // Files >= this byte size auto-select ECharts in "auto" mode
    const ECHARTS_THRESHOLD_BYTES = 500 * 1024;

    // ── Core state ────────────────────────────────────────────────────────────
    let currentCSV = "";
    let parsedHeaders = [];
    let parsedRows = [];
    let dataIsDatetime = false;   // true when first col parses as dates
    let activeRenderer = "plotly";
    let lastFileBytes = 0;
    let echart = null;
    let renderScheduled = false;
    let plotlyLoading = false;

    // ── Day/Night state ───────────────────────────────────────────────────────
    let dayNightEnabled = false;
    let userLat = null;
    let userLon = null;

    // ── Renderer resolution ───────────────────────────────────────────────────
    function resolveRenderer() {
      const sel = document.getElementById('rendererSel').value;
      if (sel !== "auto") return sel;
      return lastFileBytes >= ECHARTS_THRESHOLD_BYTES ? "echarts" : "plotly";
    }

    function onRendererChange() {
      if (!parsedRows.length) return;
      activeRenderer = resolveRenderer();
      updateBadge();
      applyChart();
    }

    function updateBadge() {
      const badge = document.getElementById('renderer-badge');
      badge.textContent = activeRenderer === "plotly" ? "Plotly" : "ECharts";
      badge.className = activeRenderer === "plotly" ? "plotly" : "echarts";
      badge.style.display = parsedRows.length ? "inline" : "none";
    }

    // ── Lazy-load Plotly 3.6.0 ────────────────────────────────────────────────
    function ensurePlotly() {
      return new Promise((resolve, reject) => {
        if (window.Plotly) { resolve(); return; }
        if (plotlyLoading) { setTimeout(() => ensurePlotly().then(resolve, reject), 50); return; }
        plotlyLoading = true;
        const s = document.createElement('script');
        s.src = "https://cdn.plot.ly/plotly-3.6.0.min.js";
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });
    }

    // ── CSV parsing — RFC 4180 ────────────────────────────────────────────────
    function parseCSV(csv) {
      const rows = [];
      let row = [], field = '', inQ = false;
      for (let i = 0; i < csv.length; i++) {
        const c = csv[i];
        if (inQ) {
          if (c === '"' && csv[i + 1] === '"') { field += '"'; i++; }
          else if (c === '"') inQ = false;
          else field += c;
        } else {
          if (c === '"') inQ = true;
          else if (c === ',') { row.push(field); field = ''; }
          else if (c === '\n') {
            row.push(field); field = '';
            if (row.some(Boolean)) rows.push(row);
            row = [];
          } else if (c !== '\r') field += c;
        }
      }
      if (field || row.length) { row.push(field); rows.push(row); }
      return rows;
    }

    function toCSV(data) {
      return data.map(row =>
        row.map(cell => (/[,"\n]/.test(cell) ? `"${cell.replace(/"/g, '""')}"` : cell)).join(',')
      ).join('\n');
    }

    // ── Load & process CSV ───────────────────────────────────────────────────
    function loadCSV(csv, fileBytes) {
      currentCSV = csv;
      lastFileBytes = fileBytes || new Blob([csv]).size;
      const data = parseCSV(csv);
      if (data.length < 2) return;
      parsedHeaders = data[0];
      parsedRows = data.slice(1);
      dataIsDatetime = parsedRows.length > 0 && !isNaN(Date.parse(parsedRows[0][0]));
      document.getElementById('status').textContent =
        `${parsedRows.length.toLocaleString()} rows × ${parsedHeaders.length} cols` +
        ` · ${(lastFileBytes / 1024).toFixed(0)} KB`;
      hiddenCols.clear();
      buildColToggles();
      activeRenderer = resolveRenderer();
      updateBadge();
      updateDayNightWarning();
      if (document.getElementById('showTable').checked) renderTable();
      scheduleChart();
    }

    // ── Column toggles ───────────────────────────────────────────────────────
    const hiddenCols = new Set();
    function buildColToggles() {
      const div = document.getElementById('col-toggles');
      div.innerHTML = '';
      parsedHeaders.slice(1).forEach((h, i) => {
        const col = i + 1;
        const lbl = document.createElement('label');
        const cb = document.createElement('input');
        cb.type = 'checkbox'; cb.checked = true;
        cb.addEventListener('change', () => {
          if (cb.checked) hiddenCols.delete(col); else hiddenCols.add(col);
          scheduleChart();
        });
        lbl.appendChild(cb); lbl.append(' ' + h);
        div.appendChild(lbl);
      });
    }

    // ── Table ────────────────────────────────────────────────────────────────
    function renderTable() {
      const container = document.getElementById('table-container');
      const frag = document.createDocumentFragment();
      const table = document.createElement('table');
      const thead = document.createElement('thead');
      const hRow = document.createElement('tr');
      parsedHeaders.forEach(h => {
        const th = document.createElement('th'); th.textContent = h; hRow.appendChild(th);
      });
      thead.appendChild(hRow); table.appendChild(thead);
      const tbody = document.createElement('tbody');
      parsedRows.forEach(rowData => {
        const tr = document.createElement('tr');
        rowData.forEach(cell => {
          const td = document.createElement('td');
          td.contentEditable = "true"; td.textContent = cell;
          td.addEventListener('input', onCellEdit);
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
      table.appendChild(tbody); frag.appendChild(table);
      container.innerHTML = ''; container.appendChild(frag);
    }

    function onCellEdit() { updateParsedFromTable(); scheduleChart(); }

    function updateParsedFromTable() {
      const rows = Array.from(document.querySelectorAll('#table-container table tr'));
      if (!rows.length) return;
      parsedHeaders = Array.from(rows[0].cells).map(c => c.textContent);
      parsedRows = rows.slice(1).map(r => Array.from(r.cells).map(c => c.textContent));
      currentCSV = toCSV([parsedHeaders, ...parsedRows]);
    }

    function toggleTable() {
      const wrapper = document.getElementById('table-wrapper');
      if (document.getElementById('showTable').checked) {
        wrapper.style.display = 'block'; renderTable();
      } else {
        wrapper.style.display = 'none';
      }
    }

    // ── Chart dispatch ────────────────────────────────────────────────────────
    function scheduleChart() {
      if (renderScheduled) return;
      renderScheduled = true;
      requestAnimationFrame(() => { renderScheduled = false; applyChart(); });
    }

    function applyChart() {
      if (!parsedRows.length) return;
      if (activeRenderer === "echarts") {
        destroyPlotly();
        renderECharts();
      } else {
        destroyECharts();
        ensurePlotly().then(renderPlotly);
      }
    }

    function destroyPlotly() {
      const el = document.getElementById('chart');
      if (window.Plotly && el._fullLayout) Plotly.purge(el);
    }

    function destroyECharts() {
      if (echart) { echart.dispose(); echart = null; }
    }

    // ── ECharts 6.1.0 renderer ────────────────────────────────────────────────
    function getEChart() {
      if (!echart) echart = echarts.init(document.getElementById('chart'));
      return echart;
    }

    function renderECharts() {
      const type = document.getElementById('chartType').value;
      const smooth = document.getElementById('smoothLine').checked;
      const stack = document.getElementById('stackSeries').checked;
      const xData = parsedRows.map(r => r[0]);
      const series = [];
      const legendData = [];

      for (let col = 1; col < parsedHeaders.length; col++) {
        if (hiddenCols.has(col)) continue;
        const name = parsedHeaders[col];
        legendData.push(name);
        const yData = parsedRows.map(r => { const n = Number(r[col]); return isNaN(n) ? null : n; });
        const s = {
          name, type,
          data: dataIsDatetime ? parsedRows.map((r, i) => [r[0], yData[i]]) : yData,
          large: true, largeThreshold: 2000,
          universalTransition: true,
        };
        if (type === 'line') {
          s.smooth = smooth;
          s.symbol = xData.length > 500 ? 'none' : 'circle';
          s.emphasis = { focus: 'series' };
        }
        if (stack) s.stack = 'total';
        series.push(s);
      }

      // Attach night shading bands to first series via markArea
      if (dayNightEnabled && userLat !== null && dataIsDatetime && series.length > 0) {
        const ranges = computeNightRanges(xData, userLat, userLon);
        if (ranges.length > 0) {
          series[0].markArea = {
            silent: true,
            label: { show: false },
            itemStyle: { color: 'rgba(20, 20, 70, 0.10)', borderWidth: 0 },
            data: ranges.map(([s, e]) => [
              { xAxis: new Date(s).toISOString() },
              { xAxis: new Date(e).toISOString() },
            ]),
          };
        }
      }

      getEChart().setOption({
        animation: parsedRows.length < 5000,
        tooltip: {
          trigger: type === 'scatter' ? 'item' : 'axis',
          axisPointer: { type: type === 'scatter' ? 'cross' : 'line' },
          confine: true,
        },
        legend: { data: legendData, bottom: 0, type: 'scroll' },
        grid: { left: '3%', right: '3%', top: '8%', bottom: '60px', containLabel: true },
        dataZoom: [
          { type: 'inside', xAxisIndex: 0, filterMode: 'filter' },
          { type: 'slider', xAxisIndex: 0, bottom: 30, height: 20 },
        ],
        xAxis: {
          type: dataIsDatetime ? 'time' : 'category',
          data: dataIsDatetime ? undefined : xData,
          name: parsedHeaders[0], nameLocation: 'middle', nameGap: 28,
          boundaryGap: type === 'bar',
          axisLabel: { rotate: xData.length > 20 ? 30 : 0, hideOverlap: true },
        },
        yAxis: { type: 'value', nameLocation: 'middle', nameGap: 40 },
        series,
      }, { notMerge: true });
    }

    // ── Plotly 3.6.0 renderer ─────────────────────────────────────────────────
    function renderPlotly() {
      const rawType = document.getElementById('chartType').value;
      const smooth = document.getElementById('smoothLine').checked;
      const stack = document.getElementById('stackSeries').checked;
      const xData = parsedRows.map(r => r[0]);
      const traces = [];

      for (let col = 1; col < parsedHeaders.length; col++) {
        if (hiddenCols.has(col)) continue;
        const name = parsedHeaders[col];
        const yData = parsedRows.map(r => { const n = Number(r[col]); return isNaN(n) ? null : n; });
        if (yData.every(v => v === null)) continue;

        const trace = { x: xData, y: yData, name };
        if (rawType === 'bar') {
          trace.type = 'bar';
          if (stack) trace.stackgroup = 'one';
        } else if (rawType === 'scatter') {
          trace.type = parsedRows.length > 10000 ? 'scattergl' : 'scatter';
          trace.mode = 'markers';
        } else {
          trace.type = parsedRows.length > 10000 ? 'scattergl' : 'scatter';
          trace.mode = smooth ? 'lines' : 'lines+markers';
          if (smooth) trace.line = { shape: 'spline' };
          if (stack) trace.stackgroup = 'one';
        }
        traces.push(trace);
      }

      // Build night shading as layout shapes (rendered below the data layer)
      let shapes = [];
      if (dayNightEnabled && userLat !== null && dataIsDatetime) {
        const ranges = computeNightRanges(xData, userLat, userLon);
        shapes = ranges.map(([s, e]) => ({
          type: 'rect',
          xref: 'x', yref: 'paper',
          x0: new Date(s).toISOString(),
          x1: new Date(e).toISOString(),
          y0: 0, y1: 1,
          fillcolor: 'rgba(20, 20, 70, 0.10)',
          line: { width: 0 },
          layer: 'below',
        }));
      }

      const layout = {
        xaxis: {
          title: { text: parsedHeaders[0] },
          type: 'date',
          automargin: true,
          rangeslider: { visible: parsedRows.length <= 5000 },
        },
        yaxis: { title: { text: 'Value' }, automargin: true },
        legend: { orientation: 'h', y: -0.25 },
        barmode: stack ? 'stack' : 'group',
        margin: { t: 30, b: 80, l: 60, r: 20 },
        modebar: { orientation: 'v' },
        shapes,
      };

      Plotly.react('chart', traces, layout, {
        responsive: true,
        displaylogo: false,
        modeBarButtonsToRemove: ['select2d', 'lasso2d'],
      });
    }

    // ── Day/Night shading ─────────────────────────────────────────────────────
    function toggleDayNight() {
      dayNightEnabled = document.getElementById('dayNightCb').checked;
      document.getElementById('location-section').style.display =
        dayNightEnabled ? 'flex' : 'none';
      if (dayNightEnabled && userLat === null) {
        getLocation();
      } else {
        updateDayNightWarning();
        scheduleChart();
      }
    }

    function updateDayNightWarning() {
      const warn = document.getElementById('location-warn');
      if (!warn) return;
      warn.textContent = (dayNightEnabled && !dataIsDatetime && parsedRows.length > 0)
        ? '⚠ Requires datetime X-axis' : '';
    }

    // Attempt GPS, then fall back to IP-based geolocation
    function getLocation() {
      setLocationStatus('Detecting location…');
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          pos => setCoords(pos.coords.latitude, pos.coords.longitude, 'GPS'),
          () => getLocationByIP(),
          { timeout: 8000 }
        );
      } else {
        getLocationByIP();
      }
    }

    function getLocationByIP() {
      setLocationStatus('GPS unavailable — trying IP geolocation…');
      fetch('https://ipapi.co/json/')
        .then(r => r.json())
        .then(d => {
          if (!d.latitude) throw new Error();
          setCoords(d.latitude, d.longitude,
            `IP estimate${d.city ? ' · ' + d.city : ''}${d.country_name ? ', ' + d.country_name : ''}`);
        })
        .catch(() =>
          fetch('https://freeipapi.com/api/json')
            .then(r => r.json())
            .then(d => {
              if (!d.latitude) throw new Error();
              setCoords(d.latitude, d.longitude, 'IP estimate');
            })
            .catch(() => {
              setLocationStatus('Could not detect location — enter coordinates manually.');
              setCoords(0, 0, 'manual');
            })
        );
    }

    function setCoords(lat, lon, source) {
      userLat = parseFloat(lat);
      userLon = parseFloat(lon);
      document.getElementById('inputLat').value = userLat.toFixed(4);
      document.getElementById('inputLon').value = userLon.toFixed(4);
      setLocationStatus('📍 ' + source);
      updateDayNightWarning();
      scheduleChart();
    }

    function setLocationStatus(msg) {
      document.getElementById('location-status').textContent = msg;
    }

    function onCoordsEdit() {
      const lat = parseFloat(document.getElementById('inputLat').value);
      const lon = parseFloat(document.getElementById('inputLon').value);
      if (isNaN(lat) || isNaN(lon)) return;
      userLat = lat;
      userLon = lon;
      setLocationStatus('📍 manual');
      scheduleChart();
    }

    // ── Sunrise/Sunset — NOAA Solar Calculator algorithm ──────────────────────
    // Accurate to ~1 min for latitudes ±72°. Returns UTC ms timestamps.
    function sunriseSet(utcDate, lat, lon) {
      const rad = d => d * Math.PI / 180;
      const deg = r => r * 180 / Math.PI;
      const y = utcDate.getUTCFullYear(), m = utcDate.getUTCMonth() + 1, d = utcDate.getUTCDate();

      // Julian day number
      const JD = 367*y - Math.floor(7*(y + Math.floor((m+9)/12)) / 4)
               + Math.floor(275*m/9) + d + 1721013.5;
      const t = (JD - 2451545.0) / 36525;

      // Geometric mean longitude & anomaly
      const L0 = (280.46646 + t*(36000.76983 + t*0.0003032)) % 360;
      const M  = (357.52911 + t*(35999.05029 - t*0.0001537)) % 360;

      // Equation of center → true longitude → apparent longitude
      const C = Math.sin(rad(M))*(1.914602 - t*(0.004817 + 0.000014*t))
              + Math.sin(rad(2*M))*(0.019993 - 0.000101*t)
              + Math.sin(rad(3*M))*0.000289;
      const omega  = 125.04 - 1934.136*t;
      const lambda = (L0 + C) - 0.00569 - 0.00478*Math.sin(rad(omega));

      // Obliquity & declination
      const eps = (23 + (26 + (21.448 - t*(46.815 + t*(0.00059 - t*0.001813)))/60)/60)
                + 0.00256*Math.cos(rad(omega));
      const dec = deg(Math.asin(Math.sin(rad(eps)) * Math.sin(rad(lambda))));

      // Equation of time (minutes)
      const y2  = Math.tan(rad(eps/2)) ** 2;
      const eot = 4*deg(
        y2*Math.sin(rad(2*L0)) - 2*0.016709*Math.sin(rad(M))
        + 4*0.016709*y2*Math.sin(rad(M))*Math.cos(rad(2*L0))
        - 0.5*y2*y2*Math.sin(rad(4*L0))
        - 1.25*0.016709*0.016709*Math.sin(rad(2*M))
      );

      // Hour angle at −0.8333° (accounts for atmospheric refraction + solar disc)
      const cosH = (Math.sin(rad(-0.8333)) - Math.sin(rad(lat))*Math.sin(rad(dec)))
                 / (Math.cos(rad(lat))*Math.cos(rad(dec)));

      if (cosH < -1) return { polarDay:   true };
      if (cosH >  1) return { polarNight: true };

      const H          = deg(Math.acos(cosH));
      const solarNoon  = 720 - 4*lon - eot;          // minutes from UTC midnight
      const dayStartMs = Date.UTC(y, m-1, d);

      return {
        sunrise: dayStartMs + (solarNoon - 4*H) * 60000,
        sunset:  dayStartMs + (solarNoon + 4*H) * 60000,
      };
    }

    // Build array of [startMs, endMs] night intervals spanning the data range
    function computeNightRanges(xData, lat, lon) {
      const times = xData.map(s => new Date(s).getTime()).filter(t => !isNaN(t));
      if (times.length < 2) return [];
      const minT = Math.min(...times);
      const maxT = Math.max(...times);

      const ranges = [];
      const cur = new Date(minT);
      cur.setUTCHours(0, 0, 0, 0);
      const endDay = new Date(maxT);
      endDay.setUTCHours(0, 0, 0, 0);

      while (cur <= endDay) {
        const ss        = sunriseSet(cur, lat, lon);
        const dayMs     = cur.getTime();
        const nextDayMs = dayMs + 86400000;

        if (ss.polarNight) {
          // Entire calendar day is dark
          const s = Math.max(dayMs, minT), e = Math.min(nextDayMs, maxT);
          if (e > s) ranges.push([s, e]);
        } else if (!ss.polarDay) {
          // Night band: midnight → sunrise
          const s1 = Math.max(dayMs, minT), e1 = Math.min(ss.sunrise, maxT);
          if (e1 > s1) ranges.push([s1, e1]);
          // Night band: sunset → midnight
          const s2 = Math.max(ss.sunset, minT), e2 = Math.min(nextDayMs, maxT);
          if (e2 > s2) ranges.push([s2, e2]);
        }
        cur.setUTCDate(cur.getUTCDate() + 1);
      }
      return ranges;
    }

    // ── File input ───────────────────────────────────────────────────────────
    document.getElementById('fileInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      window.lastUploadedFilename = file.name;
      readFile(file);
    });

    const dropArea = document.getElementById('drop-area');
    dropArea.addEventListener('dragover', e => { e.preventDefault(); dropArea.classList.add('drag-over'); });
    dropArea.addEventListener('dragleave', () => dropArea.classList.remove('drag-over'));
    dropArea.addEventListener('drop', e => {
      e.preventDefault(); dropArea.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file && file.name.endsWith('.csv')) { window.lastUploadedFilename = file.name; readFile(file); }
      else alert('Please drop a .csv file.');
    });

    function readFile(file) {
      const bytes = file.size;
      const reader = new FileReader();
      reader.onload = e => loadCSV(e.target.result, bytes);
      reader.readAsText(file);
    }

    // ── Download ─────────────────────────────────────────────────────────────
    function downloadCSV() {
      if (document.getElementById('showTable').checked) updateParsedFromTable();
      const blob = new Blob([currentCSV], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      const base = (window.lastUploadedFilename || 'data.csv').replace(/\.csv$/i, '');
      const now = new Date();
      const pad = n => n.toString().padStart(2, '0');
      const ts = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
      a.download = `${base}_${ts}.csv`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // ── Resize ────────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => { if (echart) echart.resize(); });

    // ── Auto-load sample ─────────────────────────────────────────────────────
    fetch('sample/counts.csv')
      .then(r => { if (!r.ok) throw new Error(); return r.text(); })
      .then(text => loadCSV(text, new Blob([text]).size))
      .catch(() => {});
  </script>
</body>
