<!DOCTYPE html>
<!--
  ============================================================
  csv_to_chart.html — CSV Table Viewer & Chart (dual renderer)
  ============================================================
  PURPOSE:
    Load a CSV file and render it as an interactive chart.
    Supports table editing, multiple chart types, and two chart
    rendering backends (Plotly and ECharts) selected automatically
    by file size or overridden manually by the user.

  KEY FEATURES:
    - Drag-and-drop or file-picker CSV import
    - Proper RFC 4180 CSV parsing (handles quoted fields, embedded commas/newlines)
    - Auto-detects datetime x-axis
    - Dual renderer:
        • Plotly 3.6.0  — default for files < 500 KB (rich interactivity, hover tools)
        • ECharts 6.1.0 — default for files ≥ 500 KB (canvas, large-data acceleration)
    - User can override renderer via dropdown at any time
    - Active renderer shown via color-coded badge
    - Chart types: Line, Bar, Scatter
    - Smooth line, Stack series toggles
    - Per-column series visibility checkboxes
    - ECharts: data-zoom slider + scroll-wheel pan/zoom, animation suppressed >5 k rows
    - Plotly: built-in range-slider, spline smooth, stackgroup stacking
    - Optional editable data table (hidden by default for performance)
    - Download edited CSV with timestamped filename
    - Auto-loads sample/counts.csv if present (silent fail)

  USAGE:
    Open directly in a browser (no build step). Drop a CSV file or
    use the file picker. First column is treated as the X axis;
    subsequent numeric columns become series.

  DEPENDENCIES (CDN, loaded as needed):
    - ECharts 6.1.0  : https://cdn.jsdelivr.net/npm/echarts@6.1.0/dist/echarts.min.js
    - Plotly  3.6.0  : https://cdn.plot.ly/plotly-3.6.0.min.js  (lazy-loaded)

  RENDERER THRESHOLD:
    ECHARTS_THRESHOLD_BYTES = 500 * 1024  (500 KB)
    Change this constant to adjust the auto-selection cutoff.

  CHANGELOG:
    v2  2026-06-20  Dual-renderer (Plotly + ECharts), col toggles, data-zoom,
                    proper CSV parser, lazy Plotly load, AGENTS.md docs.
                    Updated to ECharts 6.1.0 (universal transition, polar bar,
                    improved label layout) and Plotly 3.6.0 (WebGL improvements,
                    new colorway, faster react()).
  ============================================================
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CSV Table Viewer and Chart tool with dual chart rendering: Plotly for small files and ECharts for large files. Supports drag-and-drop CSV import, editable table, line/bar/scatter charts, datetime axis, per-series toggles, smooth and stacked modes, and timestamped CSV download.">
  <meta name="keywords" content="CSV viewer, CSV chart, Plotly, ECharts, data visualization, line chart, bar chart, scatter chart, drag and drop, CSV editor, datetime axis, large data, dual renderer">
  <title>CSV Table Viewer & Chart</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; margin: 1em 2em; }
    #drop-area {
      border: 2px dashed #aaa; border-radius: 8px; padding: 1.2em;
      text-align: center; color: #888; margin-bottom: 1em; background: #f9f9f9;
      cursor: pointer; transition: background 0.2s, color 0.2s;
    }
    #drop-area.drag-over { background: #e0f7fa; color: #00796b; border-color: #00796b; }
    #controls { display: flex; gap: 0.6em; align-items: center; flex-wrap: wrap; margin-bottom: 0.8em; }
    button { padding: 0.3em 0.9em; cursor: pointer; }
    select { padding: 0.3em; }
    #table-wrapper {
      max-height: 300px; overflow: auto; border: 1px solid #ddd;
      border-radius: 4px; margin-bottom: 1em; display: none;
    }
    table { border-collapse: collapse; width: 100%; font-size: 0.85em; }
    th, td { border: 1px solid #ccc; padding: 0.3em 0.6em; white-space: nowrap; }
    th { background: #f0f0f0; position: sticky; top: 0; z-index: 1; }
    td[contenteditable="true"] { background: #fffbe7; }
    #chart { width: 100%; height: 480px; }
    #status { font-size: 0.8em; color: #555; }
    #renderer-badge {
      font-size: 0.75em; padding: 0.15em 0.5em; border-radius: 3px;
      font-weight: bold; display: none;
    }
    #renderer-badge.plotly  { background: #e8f0fe; color: #1a73e8; }
    #renderer-badge.echarts { background: #e6f4ea; color: #1e8e3e; }
    #col-toggles { display: flex; gap: 0.5em; flex-wrap: wrap; margin-bottom: 0.5em; font-size: 0.85em; }
    #col-toggles label { cursor: pointer; user-select: none; }
    #col-toggles input { cursor: pointer; }
    label { display: inline-flex; align-items: center; gap: 0.25em; }
    .sep { color: #ccc; }
  </style>
  <!-- ECharts 6.1.0: adds universal transition animations, improved label layout,
       polar bar charts, and better canvas performance for large datasets -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@6.1.0/dist/echarts.min.js"></script>
  <!-- Plotly 3.6.0 lazy-loaded on demand (avoids ~4.8 MB fetch for large-file sessions) -->
</head>
<body>
  <h2 style="margin-bottom:0.5em">CSV Table Viewer &amp; Chart
    <small style="color:#888;font-size:0.6em">dual renderer</small>
  </h2>

  <input type="file" id="fileInput" accept=".csv" style="margin-bottom:0.5em">
  <div id="drop-area"><b>Drag &amp; drop a CSV file here</b> or click above to select</div>

  <div id="controls">
    <select id="chartType" onchange="applyChart()">
      <option value="line">Line</option>
      <option value="bar">Bar</option>
      <option value="scatter">Scatter</option>
    </select>

    <span class="sep">|</span>

    <label for="rendererSel" style="font-size:0.85em">Renderer:</label>
    <select id="rendererSel" onchange="onRendererChange()">
      <option value="auto">Auto (by file size)</option>
      <option value="plotly">Plotly</option>
      <option value="echarts">ECharts</option>
    </select>
    <span id="renderer-badge"></span>

    <span class="sep">|</span>

    <label><input type="checkbox" id="smoothLine" onchange="applyChart()"> Smooth</label>
    <label><input type="checkbox" id="stackSeries" onchange="applyChart()"> Stack</label>
    <label><input type="checkbox" id="showTable" onchange="toggleTable()"> Table</label>

    <span class="sep">|</span>

    <button onclick="downloadCSV()">Download CSV</button>
    <span id="status"></span>
  </div>

  <div id="col-toggles"></div>
  <div id="table-wrapper"><div id="table-container"></div></div>
  <div id="chart"></div>

  <script>
    // Files >= this byte size auto-select ECharts; below uses Plotly
    const ECHARTS_THRESHOLD_BYTES = 500 * 1024;

    let currentCSV = "";
    let parsedHeaders = [];
    let parsedRows = [];
    let activeRenderer = "plotly";
    let lastFileBytes = 0;
    let echart = null;
    let renderScheduled = false;
    let plotlyLoading = false;

    // ── Renderer resolution ───────────────────────────────────────────────────
    function resolveRenderer() {
      const sel = document.getElementById('rendererSel').value;
      if (sel !== "auto") return sel;
      return lastFileBytes >= ECHARTS_THRESHOLD_BYTES ? "echarts" : "plotly";
    }

    function onRendererChange() {
      if (!parsedRows.length) return;
      activeRenderer = resolveRenderer();
      updateBadge();
      applyChart();
    }

    function updateBadge() {
      const badge = document.getElementById('renderer-badge');
      badge.textContent = activeRenderer === "plotly" ? "Plotly" : "ECharts";
      badge.className = activeRenderer === "plotly" ? "plotly" : "echarts";
      badge.style.display = parsedRows.length ? "inline" : "none";
    }

    // ── Lazy-load Plotly 3.6.0 ────────────────────────────────────────────────
    // Plotly 3.x: improved WebGL scatter, faster Plotly.react() diffing,
    // updated default colorway, better accessibility attributes
    function ensurePlotly() {
      return new Promise((resolve, reject) => {
        if (window.Plotly) { resolve(); return; }
        if (plotlyLoading) { setTimeout(() => ensurePlotly().then(resolve, reject), 50); return; }
        plotlyLoading = true;
        const s = document.createElement('script');
        s.src = "https://cdn.plot.ly/plotly-3.6.0.min.js";
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });
    }

    // ── CSV parsing — RFC 4180 compliant ─────────────────────────────────────
    function parseCSV(csv) {
      const rows = [];
      let row = [], field = '', inQ = false;
      for (let i = 0; i < csv.length; i++) {
        const c = csv[i];
        if (inQ) {
          if (c === '"' && csv[i + 1] === '"') { field += '"'; i++; }
          else if (c === '"') inQ = false;
          else field += c;
        } else {
          if (c === '"') inQ = true;
          else if (c === ',') { row.push(field); field = ''; }
          else if (c === '\n') {
            row.push(field); field = '';
            if (row.some(Boolean)) rows.push(row);
            row = [];
          } else if (c !== '\r') field += c;
        }
      }
      if (field || row.length) { row.push(field); rows.push(row); }
      return rows;
    }

    function toCSV(data) {
      return data.map(row =>
        row.map(cell => (/[,"\n]/.test(cell) ? `"${cell.replace(/"/g, '""')}"` : cell)).join(',')
      ).join('\n');
    }

    // ── Load & process CSV ───────────────────────────────────────────────────
    function loadCSV(csv, fileBytes) {
      currentCSV = csv;
      lastFileBytes = fileBytes || new Blob([csv]).size;
      const data = parseCSV(csv);
      if (data.length < 2) return;
      parsedHeaders = data[0];
      parsedRows = data.slice(1);
      document.getElementById('status').textContent =
        `${parsedRows.length.toLocaleString()} rows × ${parsedHeaders.length} cols` +
        ` · ${(lastFileBytes / 1024).toFixed(0)} KB`;
      hiddenCols.clear();
      buildColToggles();
      activeRenderer = resolveRenderer();
      updateBadge();
      if (document.getElementById('showTable').checked) renderTable();
      scheduleChart();
    }

    // ── Column toggles ───────────────────────────────────────────────────────
    const hiddenCols = new Set();
    function buildColToggles() {
      const div = document.getElementById('col-toggles');
      div.innerHTML = '';
      parsedHeaders.slice(1).forEach((h, i) => {
        const col = i + 1;
        const lbl = document.createElement('label');
        const cb = document.createElement('input');
        cb.type = 'checkbox'; cb.checked = true;
        cb.addEventListener('change', () => {
          if (cb.checked) hiddenCols.delete(col); else hiddenCols.add(col);
          scheduleChart();
        });
        lbl.appendChild(cb); lbl.append(' ' + h);
        div.appendChild(lbl);
      });
    }

    // ── Table ────────────────────────────────────────────────────────────────
    function renderTable() {
      const container = document.getElementById('table-container');
      const frag = document.createDocumentFragment();
      const table = document.createElement('table');
      const thead = document.createElement('thead');
      const hRow = document.createElement('tr');
      parsedHeaders.forEach(h => {
        const th = document.createElement('th'); th.textContent = h; hRow.appendChild(th);
      });
      thead.appendChild(hRow); table.appendChild(thead);
      const tbody = document.createElement('tbody');
      parsedRows.forEach(rowData => {
        const tr = document.createElement('tr');
        rowData.forEach(cell => {
          const td = document.createElement('td');
          td.contentEditable = "true"; td.textContent = cell;
          td.addEventListener('input', onCellEdit);
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
      table.appendChild(tbody); frag.appendChild(table);
      container.innerHTML = ''; container.appendChild(frag);
    }

    function onCellEdit() { updateParsedFromTable(); scheduleChart(); }

    function updateParsedFromTable() {
      const rows = Array.from(document.querySelectorAll('#table-container table tr'));
      if (!rows.length) return;
      parsedHeaders = Array.from(rows[0].cells).map(c => c.textContent);
      parsedRows = rows.slice(1).map(r => Array.from(r.cells).map(c => c.textContent));
      currentCSV = toCSV([parsedHeaders, ...parsedRows]);
    }

    function toggleTable() {
      const wrapper = document.getElementById('table-wrapper');
      if (document.getElementById('showTable').checked) {
        wrapper.style.display = 'block'; renderTable();
      } else {
        wrapper.style.display = 'none';
      }
    }

    // ── Chart dispatch ────────────────────────────────────────────────────────
    function scheduleChart() {
      if (renderScheduled) return;
      renderScheduled = true;
      requestAnimationFrame(() => { renderScheduled = false; applyChart(); });
    }

    function applyChart() {
      if (!parsedRows.length) return;
      if (activeRenderer === "echarts") {
        destroyPlotly();
        renderECharts();
      } else {
        destroyECharts();
        ensurePlotly().then(renderPlotly);
      }
    }

    function destroyPlotly() {
      const el = document.getElementById('chart');
      if (window.Plotly && el._fullLayout) Plotly.purge(el);
    }

    function destroyECharts() {
      if (echart) { echart.dispose(); echart = null; }
    }

    // ── ECharts 6.1.0 renderer ────────────────────────────────────────────────
    // New in 6.x: universalTransition between chart types, improved label
    // overlap avoidance, polar coordinate bar, better aria support.
    function getEChart() {
      if (!echart) echart = echarts.init(document.getElementById('chart'));
      return echart;
    }

    function renderECharts() {
      const type = document.getElementById('chartType').value;
      const smooth = document.getElementById('smoothLine').checked;
      const stack = document.getElementById('stackSeries').checked;
      const xData = parsedRows.map(r => r[0]);
      const looksLikeDate = xData.length > 0 && !isNaN(Date.parse(xData[0]));
      const series = [];
      const legendData = [];

      for (let col = 1; col < parsedHeaders.length; col++) {
        if (hiddenCols.has(col)) continue;
        const name = parsedHeaders[col];
        legendData.push(name);
        const yData = parsedRows.map(r => { const n = Number(r[col]); return isNaN(n) ? null : n; });
        const s = {
          name, type,
          data: looksLikeDate ? parsedRows.map((r, i) => [r[0], yData[i]]) : yData,
          large: true,
          largeThreshold: 2000,
          // universalTransition (ECharts 6): smooth morph when switching chart types
          universalTransition: true,
        };
        if (type === 'line') {
          s.smooth = smooth;
          s.symbol = xData.length > 500 ? 'none' : 'circle';
          s.emphasis = { focus: 'series' };
        }
        if (stack) s.stack = 'total';
        series.push(s);
      }

      getEChart().setOption({
        animation: parsedRows.length < 5000,
        tooltip: {
          trigger: type === 'scatter' ? 'item' : 'axis',
          axisPointer: { type: type === 'scatter' ? 'cross' : 'line' },
          confine: true,
        },
        legend: { data: legendData, bottom: 0, type: 'scroll' },
        grid: { left: '3%', right: '3%', top: '8%', bottom: '60px', containLabel: true },
        dataZoom: [
          { type: 'inside', xAxisIndex: 0, filterMode: 'filter' },
          { type: 'slider', xAxisIndex: 0, bottom: 30, height: 20 },
        ],
        xAxis: {
          type: looksLikeDate ? 'time' : 'category',
          data: looksLikeDate ? undefined : xData,
          name: parsedHeaders[0], nameLocation: 'middle', nameGap: 28,
          boundaryGap: type === 'bar',
          axisLabel: { rotate: xData.length > 20 ? 30 : 0, hideOverlap: true },
        },
        yAxis: { type: 'value', nameLocation: 'middle', nameGap: 40 },
        series,
      }, { notMerge: true });
    }

    // ── Plotly 3.6.0 renderer ─────────────────────────────────────────────────
    // Plotly 3.x: faster Plotly.react() incremental diffing, improved WebGL
    // scatter performance, updated default colorway, better hover label styling.
    function renderPlotly() {
      const rawType = document.getElementById('chartType').value;
      const smooth = document.getElementById('smoothLine').checked;
      const stack = document.getElementById('stackSeries').checked;
      const xData = parsedRows.map(r => r[0]);
      const traces = [];

      for (let col = 1; col < parsedHeaders.length; col++) {
        if (hiddenCols.has(col)) continue;
        const name = parsedHeaders[col];
        const yData = parsedRows.map(r => { const n = Number(r[col]); return isNaN(n) ? null : n; });
        if (yData.every(v => v === null)) continue;

        const trace = { x: xData, y: yData, name };
        if (rawType === 'bar') {
          trace.type = 'bar';
          if (stack) trace.stackgroup = 'one';
        } else if (rawType === 'scatter') {
          trace.type = 'scatter';
          trace.mode = 'markers';
          // Plotly 3.x: use scattergl for large datasets automatically via webgl hint
          if (parsedRows.length > 10000) trace.type = 'scattergl';
        } else {
          trace.type = 'scatter';
          trace.mode = smooth ? 'lines' : 'lines+markers';
          if (smooth) trace.line = { shape: 'spline' };
          if (stack) trace.stackgroup = 'one';
          if (parsedRows.length > 10000) trace.type = 'scattergl';
        }
        traces.push(trace);
      }

      const layout = {
        xaxis: {
          title: { text: parsedHeaders[0] },
          type: 'date',
          automargin: true,
          // Plotly 3.x range slider for zooming on datetime axes
          rangeslider: { visible: parsedRows.length <= 5000 },
        },
        yaxis: { title: { text: 'Value' }, automargin: true },
        legend: { orientation: 'h', y: -0.25 },
        barmode: stack ? 'stack' : 'group',
        margin: { t: 30, b: 80, l: 60, r: 20 },
        // Plotly 3.x: modebar improvements
        modebar: { orientation: 'v' },
      };

      Plotly.react('chart', traces, layout, {
        responsive: true,
        displaylogo: false,
        modeBarButtonsToRemove: ['select2d', 'lasso2d'],
      });
    }

    // ── File input ───────────────────────────────────────────────────────────
    document.getElementById('fileInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      window.lastUploadedFilename = file.name;
      readFile(file);
    });

    const dropArea = document.getElementById('drop-area');
    dropArea.addEventListener('dragover', e => { e.preventDefault(); dropArea.classList.add('drag-over'); });
    dropArea.addEventListener('dragleave', () => dropArea.classList.remove('drag-over'));
    dropArea.addEventListener('drop', e => {
      e.preventDefault(); dropArea.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file && file.name.endsWith('.csv')) { window.lastUploadedFilename = file.name; readFile(file); }
      else alert('Please drop a .csv file.');
    });

    function readFile(file) {
      const bytes = file.size;
      const reader = new FileReader();
      reader.onload = e => loadCSV(e.target.result, bytes);
      reader.readAsText(file);
    }

    // ── Download ─────────────────────────────────────────────────────────────
    function downloadCSV() {
      if (document.getElementById('showTable').checked) updateParsedFromTable();
      const blob = new Blob([currentCSV], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      const base = (window.lastUploadedFilename || 'data.csv').replace(/\.csv$/i, '');
      const now = new Date();
      const pad = n => n.toString().padStart(2, '0');
      const ts = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
      a.download = `${base}_${ts}.csv`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // ── Resize ────────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => { if (echart) echart.resize(); });

    // ── Auto-load sample ─────────────────────────────────────────────────────
    fetch('sample/counts.csv')
      .then(r => { if (!r.ok) throw new Error(); return r.text(); })
      .then(text => loadCSV(text, new Blob([text]).size))
      .catch(() => {});
  </script>
</body>
</html>
